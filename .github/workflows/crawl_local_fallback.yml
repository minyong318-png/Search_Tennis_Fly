name: Crawl Local Fallback & Notify

on:
  workflow_dispatch:
    inputs:
      target:
        description: "City target to crawl from the self-hosted Windows runner"
        required: true
        default: "seongnam"
        type: choice
        options:
          - yongin
          - goyang
          - suwon
          - seongnam
          - anyang
          - paju
          - ggshare
          - anseong
          - uijeongbu
          - yangpyeong
          - hanam
          - uiwang
          - incheon
      force_goyang:
        description: "Run Goyang crawl outside the KST 05:00~22:00 window"
        required: false
        default: false
        type: boolean

concurrency:
  group: tennis-crawl-local-fallback
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows, X64, tennis-local]
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        shell: powershell
        run: |
          $python = "$env:LOCALAPPDATA\Programs\Python\Python311\python.exe"
          if (-not (Test-Path $python)) {
            $python = "python"
          }
          & $python --version
          & $python -m pip install --upgrade pip
          & $python -m pip install -r requirements.txt
          if (Get-Command npm -ErrorAction SilentlyContinue) {
            npm install --no-save playwright
            npx playwright install chromium
          }

      - name: Refresh Korean gov SSL pins
        shell: powershell
        continue-on-error: true
        run: |
          $python = "$env:LOCALAPPDATA\Programs\Python\Python311\python.exe"
          if (-not (Test-Path $python)) {
            $python = "python"
          }
          & $python fetch_korea_gov_certs.py

      - name: Run local refresh from this runner IP
        shell: powershell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RUN_TARGET: ${{ inputs.target }}
          FORCE_GOYANG_CRAWL: ${{ inputs.force_goyang }}
          GYT_USE_CURL_CFFI: "1"
          GYT_DEBUG_DUMP: "1"
          GYT_PROXY_URL: ${{ secrets.GYT_PROXY_URL }}
          GYS_ID: ${{ secrets.GYS_ID }}
          GYS_PW: ${{ secrets.GYS_PW }}
          ISDC_ID: ${{ secrets.ISDC_ID }}
          ISDC_PW: ${{ secrets.ISDC_PW }}
          SEONGNAM_STORAGE_STATE: ".cache/seongnam_storage_state.json"
          SEONGNAM_COLLECTOR_MODE: "android"
          SEONGNAM_DAYS_AHEAD: "7"
          SEONGNAM_ANDROID_TIMEOUT_MS: "600000"
          SEONGNAM_ANDROID_RUN_TIMEOUT: "900"
          SEONGNAM_ANDROID_FETCH_TIMEOUT_MS: "10000"
          SEONGNAM_ANDROID_CONCURRENCY: "16"
          SEONGNAM_ANDROID_BATCH_SIZE: "120"
          SEONGNAM_ANDROID_FETCH_RETRIES: "1"
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          CRAWL_TAILSCALE_EXIT_NODE: ""
          GYT_TAILSCALE_EXIT_NODE: ""
        run: |
          $python = "$env:LOCALAPPDATA\Programs\Python\Python311\python.exe"
          if (-not (Test-Path $python)) {
            $python = "python"
          }
          .\scripts\run_local_refresh.ps1 -Target "${{ inputs.target }}" -Python $python

      - name: Upload local logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-refresh-logs
          path: logs
          if-no-files-found: ignore

      - name: Upload gytennis debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gytennis-debug-local
          path: debug/gytennis
          if-no-files-found: ignore
