name: Crawl Anseong & Notify

on:
  workflow_dispatch:

concurrency:
  group: tennis-crawl-anseong
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows, X64, tennis-local]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        shell: powershell
        run: |
          $python = "$env:LOCALAPPDATA\Programs\Python\Python311\python.exe"
          if (-not (Test-Path $python)) {
            $python = "python"
          }
          & $python --version
          & $python -m pip install --upgrade pip
          & $python -m pip install -r requirements.txt

      - name: Run refresh (Anseong)
        shell: powershell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RUN_TARGET: "anseong"
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          CRAWL_TAILSCALE_EXIT_NODE: ""
        run: |
          $python = "$env:LOCALAPPDATA\Programs\Python\Python311\python.exe"
          if (-not (Test-Path $python)) {
            $python = "python"
          }
          .\scripts\run_local_refresh.ps1 -Target "anseong" -Python $python
