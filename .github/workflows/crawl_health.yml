name: Crawl Health Check

on:
  schedule:
    # Daily city crawler health check at 09:30 KST.
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check crawler health
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python check_crawl_health.py --json crawl-health.json

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-health
          path: crawl-health.json
          if-no-files-found: ignore
