name: Crawl Goyang & Notify

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: 100.120.193.30

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh Korean gov SSL pins
        continue-on-error: true
        run: python fetch_korea_gov_certs.py

      - name: Run refresh (Goyang)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RUN_TARGET: "goyang"
          GYT_TAILSCALE_EXIT_NODE: "100.120.193.30"
          GYT_USE_CURL_CFFI: "1"
          GYT_DEBUG_DUMP: "1"
          GYT_PROXY_URL: ${{ secrets.GYT_PROXY_URL }}
          GYS_ID: ${{ secrets.GYS_ID }}
          GYS_PW: ${{ secrets.GYS_PW }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          python refresh_and_notify.py

      - name: Upload gytennis debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gytennis-debug-goyang
          path: debug/gytennis
          if-no-files-found: ignore
